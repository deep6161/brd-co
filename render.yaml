databases:
  - name: brdco-db
    plan: free
    databaseName: brdco
    user: brdco_user

services:
  - type: web
    name: brd-co
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn testpro.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brdco-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
